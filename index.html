<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>m o s s e a t s t e x t</title>

<style>
body {
  margin: 0;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  border: 1px solid #000;
  cursor: crosshair;
  touch-action: none; /* fondamentale per iOS */
}
</style>
</head>

<body>

<canvas id="canvas" width="720" height="720"></canvas>

<script>

/* ===================== SETUP ===================== */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });

const W = canvas.width;
const H = canvas.height;

let active = false;

/* ===================== TESTO ===================== */

const TEXT = `
April is the cruellest month, breeding 
Lilacs out of the dead land, mixing
Memory and desire...
`.repeat(20);

function drawTextField() {
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "#000";
  ctx.font = "13px Times New Roman";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";

  const padding = 70;
  const lineHeight = 5;

  let x = padding;
  let y = -padding;

  const words = TEXT.replace(/\n+/g, " ").split(" ");

  words.forEach(word => {
    const w = ctx.measureText(word + " ").width;

    if (x + w > W - padding) {
      x = padding;
      y += lineHeight;
    }

    ctx.fillText(word + " ", x, y);
    x += w;
  });
}

drawTextField();

/* ===================== MAPPA TESTO ===================== */

const baseMap = ctx.getImageData(0, 0, W, H).data;

function textDensity(x, y) {
  const i = (Math.floor(y) * W + Math.floor(x)) * 4;
  return baseMap[i] < 200;
}

/* ===================== MUSCHIO ===================== */

let moss = [];
let occupied = new Set();

function seed(x, y, n = 200) {
  for (let i = 0; i < n; i++) {
    const nx = x + (Math.random() - 0.5) * 30;
    const ny = y + (Math.random() - 0.5) * 30;

    if (textDensity(nx, ny)) {
      moss.push({ x: nx, y: ny });
    }
  }
}

/* ===================== PARAMETRI ===================== */

const GROWTH_PER_FRAME = 600;
const STEP = 1.4;

/* ===================== CRESCITA ===================== */

function grow() {
  if (!active || moss.length === 0) return;

  let newborns = [];

  for (let i = 0; i < GROWTH_PER_FRAME; i++) {
    const p = moss[Math.floor(Math.random() * moss.length)];
    const a = Math.random() * Math.PI * 2;

    const nx = p.x + Math.cos(a) * STEP;
    const ny = p.y + Math.sin(a) * STEP;

    if (nx < 1 || ny < 1 || nx >= W - 1 || ny >= H - 1) continue;
    if (!textDensity(nx, ny)) continue;

    const key = (nx | 0) + "," + (ny | 0);
    if (occupied.has(key)) continue;

    occupied.add(key);
    newborns.push({ x: nx, y: ny });
  }

  moss.push(...newborns);
}

/* ===================== NUOVI NUCLEI ===================== */

setInterval(() => {
  if (!active) return;

  let x, y, tries = 0;

  do {
    x = Math.random() * W;
    y = Math.random() * H;
    tries++;
  } while (!textDensity(x, y) && tries < 1000);

  seed(x, y, 80);
}, 2000);

/* ===================== RENDER ===================== */

function drawMoss() {
  ctx.fillStyle = "#fff";

  moss.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 0.8, 0, Math.PI * 2);
    ctx.fill();
  });
}

/* ===================== INTERAZIONE UNIVERSALE ===================== */

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

/* attivazione iniziale */
canvas.addEventListener("pointerdown", e => {
  active = true;
  const p = getPos(e);
  seed(p.x, p.y, 250);
});

/* crescita continua mentre si muove */
canvas.addEventListener("pointermove", e => {
  if (e.pressure === 0 && e.pointerType !== "mouse") return;

  active = true;
  const p = getPos(e);
  seed(p.x, p.y, 40);
});

/* opzionale: anche mouse hover su desktop */
canvas.addEventListener("pointerenter", e => {
  if (e.pointerType === "mouse") {
    const p = getPos(e);
    active = true;
    seed(p.x, p.y, 120);
  }
});

/* ===================== LOOP ===================== */

function animate() {
  grow();
  drawMoss();
  requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
